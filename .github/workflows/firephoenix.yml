name: Fire Phoenix Radar

on:
  workflow_dispatch:

  schedule:
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run Fire Phoenix
        run: |
          python fire_phoenix_forecast.py > report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fire-report
          path: report.txt
